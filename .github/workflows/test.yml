name: test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-python:
    if: ${{ contains(github.event.head_commit.message, '!test') || github.event_name == 'workflow_dispatch' }}
    name: test ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.14t"
          - "3.15"
          - "3.15t"
          - "pypy3.11"

    runs-on: ubuntu-latest
    continue-on-error: ${{ endsWith(matrix.python-version, 't') }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: set up python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - run: pip install pytest pytest-asyncio maturin

      - run: pip install -e .
        env:
          RUST_BACKTRACE: 1

      - run: pip freeze

      - run: pytest -vv
        env:
          RUST_BACKTRACE: 1
          HYPOTHESIS_PROFILE: slow

  test-os:
    if: ${{ contains(github.event.head_commit.message, '!test') || github.event_name == 'workflow_dispatch' }}
    name: test on ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]

    runs-on: ${{ matrix.os }}-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: set up python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - run: pip install pytest pytest-asyncio maturin

      - run: pip install -e .
        env:
          RUST_BACKTRACE: 1

      - run: pip freeze

      - run: pytest -vv
        env:
          RUST_BACKTRACE: 1
          HYPOTHESIS_PROFILE: slow
